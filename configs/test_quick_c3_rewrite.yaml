# ============================================================
# Test rapide — Lot C / Variante 3 : Rewrite (Qwen + rewriter Groq)
# 5 questions × 5 langues = 25 appels rewriter Groq + 25 appels Qwen local
# Pré-requis : Ollama lancé + GROQ_API_KEY dans .env
# ============================================================

run_id: "test_quick_c3_rewrite"

provider: "qwen_ollama"
model: "qwen2.5:3b"
ollama_base_url: "http://localhost:11434/v1"

languages:
  - "fr"
  - "it"
  - "en"
  - "es"
  - "de"

dataset_type: "specific"

max_questions: 5
sample_seed: 42

generation:
  temperature: 0.0
  max_tokens: 150
  top_p: 1.0

prompting:
  strategy: "rewrite"
  rewriter:
    provider: "groq"
    model: "llama-3.1-8b-instant"
    max_tokens: 80

paths:
  input_dir: "data/input"
  output_dir: "data/output/runs"
