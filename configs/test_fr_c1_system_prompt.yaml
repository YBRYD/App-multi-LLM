# ============================================================
# Test FR-only — Lot C / Variante 1 : System Prompt
# Une seule langue (français), 5 questions — ~10 sec.
# Provider : Groq llama-3.1-8b-instant
# ============================================================

run_id: "test_fr_c1_system_prompt"

provider: "groq"
model: "llama-3.1-8b-instant"

languages:
  - "fr"

dataset_type: "specific"

max_questions: 5
sample_seed: 42

generation:
  temperature: 0.0
  max_tokens: 150
  top_p: 1.0

prompting:
  strategy: "system_prompt"
  preset: "concise"

paths:
  input_dir: "data/input"
  output_dir: "data/output/runs"
