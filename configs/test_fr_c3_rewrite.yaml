# ============================================================
# Test FR-only — Lot C / Variante 3 : Rewrite
# Une seule langue (français), 5 questions — ~30 sec.
# Cible : Qwen 2.5 3B local (Ollama)
# Rewriter : Groq llama-3.1-8b-instant
# Pré-requis : Ollama lancé + GROQ_API_KEY dans .env
# ============================================================

run_id: "test_fr_c3_rewrite"

provider: "qwen_ollama"
model: "qwen2.5:3b"
ollama_base_url: "http://localhost:11434/v1"

languages:
  - "fr"

dataset_type: "specific"

max_questions: 5
sample_seed: 42

generation:
  temperature: 0.0
  max_tokens: 150
  top_p: 1.0

prompting:
  strategy: "rewrite"
  rewriter:
    provider: "groq"
    model: "llama-3.1-8b-instant"
    max_tokens: 80

paths:
  input_dir: "data/input"
  output_dir: "data/output/runs"
