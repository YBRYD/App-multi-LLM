# ============================================================
# Test rapide — Lot C / Variante 2 : Prefix + Suffix
# 5 questions par langue × 5 langues = 25 appels Qwen local
# Pré-requis : Ollama lancé + `ollama pull qwen2.5:3b`
# ============================================================

run_id: "test_quick_c2_prefix_suffix"

provider: "qwen_ollama"
model: "qwen2.5:3b"
ollama_base_url: "http://localhost:11434/v1"

languages:
  - "fr"
  - "it"
  - "en"
  - "es"
  - "de"

dataset_type: "specific"

max_questions: 5
sample_seed: 42

generation:
  temperature: 0.0
  max_tokens: 150
  top_p: 1.0

prompting:
  strategy: "prefix_suffix"

paths:
  input_dir: "data/input"
  output_dir: "data/output/runs"
